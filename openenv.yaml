name: student-exam-strategy-env

version: 1.0

entrypoint:
  module: main
  app: app

api:
  reset: /reset
  step: /step
  state: /state

tags:
  - reinforcement-learning
  - education
  - exam-strategy

action_space:
  type: discrete
  actions:
    - study_new_topic
    - revise
    - mock_test
    - rest
    - skip

observation_space:
  type: object
  properties:
    energy:
      type: float
      range: [0, 1]

    stress:
      type: float
      range: [0, 1]

    subjects:
      type: object
      properties:
        math:
          type: float
          range: [0, 1]
        physics:
          type: float
          range: [0, 1]
        chemistry:
          type: float
          range: [0, 1]

    revision_level:
      type: float
      range: [0, 1]

    mock_test_score:
      type: float
      range: [0, 100]

    confidence:
      type: float
      range: [0, 1]

    forgetting_risk:
      type: float
      range: [0, 1]

    learning_efficiency:
      type: float
      range: [0, 1]

    exam_days_left:
      type: integer

reward:
  type: float
  range: [-1, 1]

tasks:
  - name: easy
    grader: graders.easy:grade

  - name: medium
    grader: graders.medium:grade

  - name: hard
    grader: graders.hard:grade