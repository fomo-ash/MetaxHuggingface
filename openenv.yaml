name: student-exam-strategy-env

description: >
  A reinforcement learning environment simulating engineering exam preparation.
  The agent must balance studying multiple subjects, revision, testing, and rest
  while managing energy and stress under time constraints.

version: 1.0

entrypoint:
  module: main
  app: app

api:
  reset: /reset
  step: /step
  state: /state

tags:
  - reinforcement-learning
  - education
  - exam-strategy

action_space:
  type: discrete
  actions:
    - study_new_topic
    - revise
    - mock_test
    - rest
    - skip

observation_space:
  type: object
  properties:
    energy:
      type: float
      range: [0, 1]

    stress:
      type: float
      range: [0, 1]

    subjects:
      type: object
      properties:
        math:
          type: float
          range: [0, 1]
        physics:
          type: float
          range: [0, 1]
        chemistry:
          type: float
          range: [0, 1]

    revision_level:
      type: float
      range: [0, 1]

    mock_test_score:
      type: float
      range: [0, 100]

    confidence:
      type: float
      range: [0, 1]

    forgetting_risk:
      type: float
      range: [0, 1]

    learning_efficiency:
      type: float
      range: [0, 1]

    exam_days_left:
      type: integer

reward:
  type: float
  range: [-1, 1]

tasks:
  - name: easy
    description: Achieve average subject mastery above 0.8
    grader: graders.easy:grade

  - name: medium
    description: Balance subject mastery and revision level above 0.6
    grader: graders.medium:grade

  - name: hard
    description: Optimize full exam readiness including performance, balance, and stress
    grader: graders.hard:grade